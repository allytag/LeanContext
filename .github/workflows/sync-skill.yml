name: Sync SKILL.md and rules

on:
  push:
    branches: [main]
    paths:
      - skills/leancontext/SKILL.md
      - rules/leancontext-activate.md
      - leancontext-compress/SKILL.md
      - leancontext-compress/scripts/**

concurrency:
  group: sync-skill
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest before making changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Sync SKILL.md copies
        run: |
          cp skills/leancontext/SKILL.md leancontext/SKILL.md
          cp skills/leancontext/SKILL.md plugins/leancontext/skills/leancontext/SKILL.md
          cp skills/leancontext/SKILL.md .cursor/skills/leancontext/SKILL.md
          mkdir -p .windsurf/skills/leancontext
          cp skills/leancontext/SKILL.md .windsurf/skills/leancontext/SKILL.md

      - name: Sync compress skill
        run: |
          # Sync to skills/compress (main location for Gemini CLI)
          rm -rf skills/compress/scripts
          cp leancontext-compress/SKILL.md skills/compress/SKILL.md
          sed -i 's/^name: leancontext-compress$/name: compress/' skills/compress/SKILL.md
          sed -i "s|The compression scripts live in \`leancontext-compress/scripts/\` (adjacent to this SKILL.md). If the path is not immediately available, search for \`leancontext-compress/scripts/__main__.py\`.|This SKILL.md lives alongside \`scripts/\` in the same directory. Find that directory.|" skills/compress/SKILL.md
          sed -i 's|cd leancontext-compress && python3|cd <directory_containing_this_SKILL.md> \&\& python3|' skills/compress/SKILL.md
          cp -r leancontext-compress/scripts skills/compress/scripts
          rm -rf skills/compress/scripts/__pycache__

      - name: Sync compress skill to plugin
        run: |
          # Copy SKILL.md and patch name + process instructions for plugin context
          cp leancontext-compress/SKILL.md plugins/leancontext/skills/compress/SKILL.md
          sed -i 's/^name: leancontext-compress$/name: compress/' plugins/leancontext/skills/compress/SKILL.md
          sed -i "s|The compression scripts live in \`leancontext-compress/scripts/\` (adjacent to this SKILL.md). If the path is not immediately available, search for \`leancontext-compress/scripts/__main__.py\`.|This SKILL.md lives alongside \`scripts/\` in the same directory. Find that directory.|" plugins/leancontext/skills/compress/SKILL.md
          sed -i 's|cd leancontext-compress && python3|cd <directory_containing_this_SKILL.md> \&\& python3|' plugins/leancontext/skills/compress/SKILL.md
          # Copy scripts verbatim
          rm -rf plugins/leancontext/skills/compress/scripts
          cp -r leancontext-compress/scripts plugins/leancontext/skills/compress/scripts
          rm -rf plugins/leancontext/skills/compress/scripts/__pycache__

      - name: Rebuild leancontext.skill ZIP
        run: cd skills && zip -r ../leancontext.skill leancontext/

      - name: Sync auto-activation rules
        run: |
          BODY="rules/leancontext-activate.md"

          # Cline + Copilot — no frontmatter, direct copy
          mkdir -p .clinerules .github
          cp "$BODY" .clinerules/leancontext.md
          cp "$BODY" .github/copilot-instructions.md

          # Cursor — needs alwaysApply frontmatter
          mkdir -p .cursor/rules
          printf '%s\n' '---' 'description: "LeanContext mode — terse communication, ~75% fewer tokens, full technical accuracy"' 'alwaysApply: true' '---' '' > .cursor/rules/leancontext.mdc
          cat "$BODY" >> .cursor/rules/leancontext.mdc

          # Windsurf — needs always_on frontmatter
          mkdir -p .windsurf/rules
          printf '%s\n' '---' 'trigger: always_on' '---' '' > .windsurf/rules/leancontext.md
          cat "$BODY" >> .windsurf/rules/leancontext.md

      - name: Commit and push if changed
        run: |
          git add \
            leancontext/SKILL.md \
            skills/compress/ \
            plugins/leancontext/skills/compress/ \
            plugins/leancontext/skills/leancontext/SKILL.md \
            .cursor/skills/leancontext/SKILL.md \
            .windsurf/skills/leancontext/SKILL.md \
            leancontext.skill \
            .clinerules/leancontext.md \
            .github/copilot-instructions.md \
            .cursor/rules/leancontext.mdc \
            .windsurf/rules/leancontext.md
          git diff --staged --quiet && exit 0
          git commit -m "chore: sync SKILL.md copies and auto-activation rules [skip ci]"
          git push
